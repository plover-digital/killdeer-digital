services:
  caddy:
    image: docker.io/library/caddy:2-alpine
    depends_on:
      - killdeer-site
    ports:
      - "${BIND_IP:-0.0.0.0}:${HTTP_PORT:-80}:80"
      - "${BIND_IP:-0.0.0.0}:${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,Z
      - caddy-data:/data
      - caddy-config:/config

  killdeer-site:
    image: killdeer-digital:latest
    build:
      context: .
      dockerfile: Containerfile
    expose:
      - "8080"
    environment:
      PORT: "8080"

volumes:
  caddy-data:
  caddy-config:
